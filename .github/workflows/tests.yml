name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '10'
            testbench: '^8.0'
            pest: '^2.0'
          - php: '8.2'
            laravel: '11'
            testbench: '^9.0'
            pest: '^2.0|^3.0'
          - php: '8.2'
            laravel: '12'
            testbench: '^10.0'
            pest: '^3.0'
          - php: '8.3'
            laravel: '13'
            testbench: '^11.0'
            pest: '^4.0'
          - php: '8.4'
            laravel: '13'
            testbench: '^11.0'
            pest: '^4.0'
          - php: '8.5'
            laravel: '13'
            testbench: '^11.0'
            pest: '^4.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Pin Laravel test dependencies
        run: composer require --dev orchestra/testbench:"${{ matrix.testbench }}" pestphp/pest:"${{ matrix.pest }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run tests
        run: vendor/bin/pest
