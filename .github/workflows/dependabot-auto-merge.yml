name: Dependabot auto-merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Enable auto-merge for safe Dependabot updates
    runs-on: ubuntu-latest

    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'Codegenie-BE/laravel-config-cache-guard' &&
      github.event.pull_request.draft == false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for safe patch and minor updates
        if: >
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          ) &&
          (
            steps.metadata.outputs.package-ecosystem == 'github-actions' ||
            steps.metadata.outputs.dependency-type == 'direct:development'
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}